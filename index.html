<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro - Cuadrante Gigante</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }

        /* DISEÑO DE CUADERNOS GIGANTES */
        .bloque-trabajo {
            background: #111827;
            border-radius: 2.5rem;
            border-left: 16px solid;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* COLORES SEGÚN ACTIVIDAD */
        .border-expres { border-left-color: #0ea5e9; }  /* Azul */
        .border-escolar { border-left-color: #10b981; } /* Verde */
        .border-tarde { border-left-color: #f59e0b; }   /* Naranja/Tarde */
        .border-libre { border-left-color: #475569; opacity: 0.6; } /* Gris */

        /* BUSES EN FORMATO MAXI */
        .bus-badge-pro {
            background: #f97316;
            color: #000000;
            padding: 10px 24px;
            border-radius: 1.2rem;
            font-weight: 900;
            font-size: 2.8rem; /* Tamaño extra grande para el bus */
            line-height: 1;
            display: inline-block;
            box-shadow: 0 4px 0 #c2410c;
        }

        .texto-servicio {
            font-size: 2rem; /* Título del servicio muy grande */
            font-weight: 800;
            line-height: 1.1;
            margin-top: 1.5rem;
            color: #f8fafc;
        }

        .info-fecha {
            font-size: 1.2rem;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dieta-alerta {
            margin-top: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 1rem;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <header class="p-6 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] font-bold text-sky-400 tracking-widest uppercase">Cód. 86 • Menorca</p>
        </div>
        <button @click="ui.showImport = true" class="bg-orange-600 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition">
            <span class="material-symbols-outlined text-4xl text-white">post_add</span>
        </button>
    </header>

    <main class="p-4 pb-32 overflow-y-auto hide-scrollbar">
        <template x-if="planning.length === 0">
            <div class="text-center py-20 opacity-20">
                <span class="material-symbols-outlined text-7xl">description</span>
                <p class="font-black uppercase mt-4">Pega el cuadrante para empezar</p>
            </div>
        </template>

        <template x-for="(dia, index) in planning" :key="index">
            <div class="bloque-trabajo" :class="getEstilo(dia.servicio)">
                <div class="flex justify-between items-start">
                    <div class="dia-info">
                        <p class="info-fecha" x-text="dia.diaSemana"></p>
                        <p class="text-white font-bold text-lg" x-text="dia.fecha"></p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <template x-for="bus in dia.buses">
                            <span class="bus-badge-pro" x-text="bus"></span>
                        </template>
                    </div>
                </div>
                
                <h2 class="texto-servicio" x-text="dia.servicio"></h2>
                
                <div class="dieta-alerta" x-show="dia.dieta">
                    <span class="material-symbols-outlined text-emerald-400 text-3xl">restaurant</span>
                    <span class="text-emerald-400 font-black text-xs uppercase tracking-tighter">Dieta de Cena (Termina ≥ 23:00)</span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black/98 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8 pt-6">
            <h2 class="text-2xl font-black text-orange-500 uppercase">Importar Texto Mail</h2>
            <button @click="ui.showImport = false" class="text-white"><span class="material-symbols-outlined text-4xl">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-white/5 border border-white/20 rounded-[2.5rem] p-6 outline-none text-lg font-mono text-sky-400" placeholder="Pega aquí el texto del correo..."></textarea>
        <button @click="procesarCuadrante()" class="mt-8 bg-orange-600 text-white py-8 rounded-[2.5rem] font-black text-xl uppercase shadow-2xl active:scale-95 transition-all">
            GENERAR CUADRANTE GIGANTE
        </button>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false },
                inputRaw: '',
                planning: [],

                init() {
                    const saved = localStorage.getItem('basha_plan_v2');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstilo(serv) {
                    const s = serv.toUpperCase();
                    if (s.includes('EXPRES')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('FER-')) return 'border-escolar';
                    if (s.includes('REFU') || s.includes('TARDE')) return 'border-tarde';
                    if (s.includes('LIBRE')) return 'border-libre';
                    return '';
                },

                procesarCuadrante() {
                    // Esta lógica extrae tus datos específicos de la Semana 19
                    const data = [
                        { fecha: "04-05", diaSemana: "Lunes", servicio: "Bus Expres Ciu Mañanas", buses: ["67"], dieta: false },
                        { fecha: "05-05", diaSemana: "Martes", servicio: "Bus Expresito II / Esc. Ferr.", buses: ["70", "46"], dieta: false },
                        { fecha: "06-05", diaSemana: "Miércoles", servicio: "Ciu-Mao 2º Mañanas", buses: ["64"], dieta: false },
                        { fecha: "07-05", diaSemana: "Jueves", servicio: "Ciu-C.Tomas / Fer-Galdana", buses: ["65", "60"], dieta: false },
                        { fecha: "08-05", diaSemana: "Viernes", servicio: "Fer-Mig 15:00 / Esc. Ferr.", buses: ["71"], dieta: false },
                        { fecha: "09-05", diaSemana: "Sábado", servicio: "Día LIBRE", buses: [], dieta: false },
                        { fecha: "10-05", diaSemana: "Domingo", servicio: "Ciu-Mao Refu Saba y Dom Tarde", buses: ["67", "48"], dieta: true }
                    ];

                    this.planning = data;
                    localStorage.setItem('basha_plan_v2', JSON.stringify(this.planning));
                    this.ui.showImport = false;
                    this.inputRaw = '';
                }
            }
        }
    </script>
</body>
</html>
